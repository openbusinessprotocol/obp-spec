  source_type: obp_curated
  authoritative_source: https://eur-lex.europa.eu/eli/reg/2024/1689/oj
  description: EU AI Act Article 50 — Transparency obligations (CAL-1)
  note: |
    CAL-1 = AXIS-2 予防的透明性要件。AXIS 直接違反ではなく責任帰属の明確化を要求。
    委譲は成立するが、出力への開示マーキングが必要。

